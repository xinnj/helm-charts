# SPDX-License-Identifier: Apache-2.0
# =============================================================================
# Mosquitto Helm Chart
# =============================================================================
# Uses the official eclipse-mosquitto image.
# Supports multi-replica operational HA with stable pod identity and WebSocket.
# Includes an optional MQTTX Web companion UI for browser-based testing.
# =============================================================================

nameOverride: ""
fullnameOverride: ""
commonLabels: {}

# -- Deployment architecture for Mosquitto brokers: standalone for a single broker, federated for bridged brokers.
architecture:
  mode: standalone

# -- Kubernetes cluster domain
clusterDomain: cluster.local

image:
  # -- Mosquitto container image repository
  repository: docker.io/iegomez/mosquitto-go-auth
  # -- Mosquitto image tag validated on Docker Hub for the default non-Alpine release
  tag: "3.0.0-mosquitto_2.0.18"
  # -- Image pull policy
  pullPolicy: IfNotPresent

imagePullSecrets: []

broker:
  # -- Number of Mosquitto broker replicas
  replicaCount: 1

  multiReplicaDefaults:
    # -- Apply opinionated scheduling defaults when replicaCount > 1 and no custom affinity/topologySpreadConstraints are set
    enabled: true
    # -- Pod anti-affinity mode automatically applied for multi-replica broker pods: preferred | required | none
    podAntiAffinity: preferred
    topologySpread:
      # -- Apply a topology spread constraint automatically for multi-replica broker pods
      enabled: true
      # -- Topology key used by the generated spread constraint
      topologyKey: kubernetes.io/hostname
      # -- whenUnsatisfiable policy used by the generated spread constraint
      whenUnsatisfiable: ScheduleAnyway

  # -- Append raw Mosquitto configuration lines to the generated mosquitto.conf
  extraConfig: |-
    # Authentication plugin
    auth_plugin /mosquitto/go-auth.so
    auth_opt_backends files, http
    auth_opt_files_password_path /mosquitto/config/generated/passwordfile
    auth_opt_files_acl_path /mosquitto/config/generated/aclfile
    auth_opt_http_host mqtt-auth-service
    auth_opt_http_port 80
    auth_opt_http_getuser_uri /mqtt/auth
    auth_opt_http_aclcheck_uri /mqtt/acl
    auth_opt_http_response_mode status
    auth_opt_http_params_mode json
    auth_opt_http_timeout 5
    auth_opt_disable_superuser true
    auth_opt_log_level info

    # Suppress connect/disconnect log noise from health checks
    connection_messages false
    
    auth_opt_cache true
    auth_opt_cache_refresh true

  # -- Override the port number used for Kubernetes health probes (e.g., 9000 for a custom plaintext listener)
  probePortOverride: null

  listeners:
    # -- MQTT TCP listener port (used only when broker.tls.enabled=false)
    mqtt: 1883
    # -- Enable MQTT over WebSocket listener
    websocketEnabled: true
    # -- MQTT over WebSocket listener port
    websocket: 9001

  tls:
    # -- Enable MQTT TLS listener
    enabled: false
    # -- MQTT TLS listener port
    port: 8883
    # -- Existing Secret name containing broker TLS material
    certSecretName: ""
    # -- Secret key name for server certificate
    certFile: tls.crt
    # -- Secret key name for server private key
    keyFile: tls.key
    # -- Optional secret key name for CA certificate used for client certificate validation
    caFile: ""
    # -- Require clients to present a valid certificate (mTLS)
    requireCertificate: false
    # -- Use client certificate identity as MQTT username when mTLS is enabled
    useIdentityAsUsername: false

  limits:
    # -- Maximum concurrently connected clients. Use 0 for broker default.
    maxConnections: 0
    # -- Maximum in-flight QoS 1/2 messages per client. Use 0 for broker default.
    maxInflightMessages: 0
    # -- Maximum queued QoS 1/2 messages per client. Use 0 for broker default.
    maxQueuedMessages: 0
    # -- Maximum queued message bytes per client. Use 0 for broker default.
    maxQueuedBytes: 0
    # -- Maximum accepted MQTT packet size in bytes. Use 0 for broker default.
    maxPacketSize: 0
    # -- Deprecated: use broker.limits.maxPacketSize instead.
    messageSizeLimit: 0

  federation:
    # -- Topics exported and imported through Mosquitto bridge connections when architecture.mode=federated
    topicPattern: "#"
    # -- Direction used by bridge topic rules between broker peers
    topicDirection: both
    # -- QoS used by bridge topic rules between broker peers
    topicQos: 1
    # -- Whether brokers should advertise bridge semantics to remote peers for loop handling and retained propagation
    tryPrivate: true
    # -- Restart timeout base value, in seconds, for bridge reconnection backoff
    restartTimeoutBase: 5
    # -- Restart timeout cap value, in seconds, for bridge reconnection backoff
    restartTimeoutCap: 30

  persistence:
    # -- Enable persistence for Mosquitto data
    enabled: true
    # -- Storage class for broker PVCs
    storageClass: ""
    # -- Access mode for broker PVCs
    accessMode: ReadWriteOnce
    # -- Size of each broker PVC
    size: 8Gi

auth:
  # -- Enable username/password authentication
  enabled: true
  # -- Auth mode: "native" uses Mosquitto's built-in password_file/acl_file;
  #    "go-auth" delegates to the go-auth plugin for backend chaining (files → http).
  mode: go-auth
  # -- Username stored in the generated password file
  username: exporter
  # -- Password stored in the generated password file. Auto-generated if empty.
  password: "exporter-pass-2024"
  # -- Existing secret containing username and password
  existingSecret: ""
  # -- Secret key for the username in auth.existingSecret
  existingSecretUsernameKey: username
  # -- Secret key for the password in auth.existingSecret
  existingSecretPasswordKey: password

acl:
  # -- Enable ACL file generation and enforcement
  enabled: true
  # -- Raw ACL rules written to the generated aclfile
  rules: |-
    user exporter
    topic read $SYS/#
  # -- Existing ConfigMap with a custom aclfile key
  existingConfigMap: ""
  # -- ConfigMap key name used when acl.existingConfigMap is set
  existingConfigMapKey: aclfile

service:
  # -- Service type for broker clients
  type: ClusterIP
  # -- Session affinity for MQTT client traffic. Use ClientIP only when sticky routing is explicitly desired.
  sessionAffinity: None
  # -- External traffic policy when using NodePort or LoadBalancer
  externalTrafficPolicy: Cluster
  # -- Annotations for the broker Service
  annotations: {}
  # -- Override MQTT service port (used only when broker.tls.enabled=false)
  mqttPort: 1883
  # -- Override WebSocket service port
  websocketPort: 9001
  # -- Override MQTT TLS service port when broker.tls.enabled=true
  mqttsPort: 8883
  # -- NodePort for MQTT when service type is NodePort or LoadBalancer (0 = omit; cluster assigns)
  mqttNodePort: 0
  # -- NodePort for WebSocket when service type is NodePort or LoadBalancer (0 = omit)
  websocketNodePort: 0
  # -- NodePort for MQTTS when service type is NodePort or LoadBalancer (0 = omit)
  mqttsNodePort: 0
  # -- External IPs for the broker Service
  externalIPs: []

headlessService:
  # -- Annotations for the headless broker Service
  annotations: {}

websocketIngress:
  # -- Enable ingress for the broker WebSocket listener
  enabled: true
  # -- Ingress class name for the WebSocket route
  ingressClassName: "nginx"
  # -- Annotations for the WebSocket ingress
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  # -- WebSocket ingress hosts
  hosts:
     - host: mqtt.example.com
       paths:
         - path: /mqtt
           pathType: Prefix
  # -- TLS configuration for the WebSocket ingress
  tls:
    - hosts:
        - 'mqtt.example.com'

mqttxWeb:
  # -- Enable MQTTX Web companion UI
  enabled: false
  image:
    # -- MQTTX Web image repository
    repository: docker.io/emqx/mqttx-web
    # -- MQTTX Web image tag. Keep empty to use the image's default tag while upstream release/tag mismatch is under review.
    tag: ""
    # -- Image pull policy
    pullPolicy: IfNotPresent
  # -- Number of MQTTX Web replicas
  replicaCount: 1
  service:
    # -- Service type for MQTTX Web
    type: ClusterIP
    # -- HTTP service port for MQTTX Web
    port: 80
    # -- Annotations for the MQTTX Web service
    annotations: {}
  ingress:
    # -- Enable ingress for MQTTX Web
    enabled: false
    # -- Ingress class name
    ingressClassName: ""
    # -- Ingress annotations
    annotations: {}
    # -- MQTTX Web ingress hosts
    hosts: []
      # - host: mqttx.example.com
      #   paths:
      #     - path: /
      #       pathType: Prefix
    # -- MQTTX Web ingress TLS configuration
    tls: []
  broker:
    # -- Browser-visible scheme used by MQTTX Web when building the default broker URL
    scheme: ws
    # -- Browser-visible host override. Defaults to the first websocketIngress host when available.
    host: ""
    # -- Browser-visible port override. Defaults to websocket ingress standard port or the broker WebSocket service port.
    port: 0
    # -- WebSocket path used by browsers
    path: /mqtt
    # -- Default connection name documented for users of the companion UI
    connectionName: Mosquitto
  resources: {}
  podLabels: {}
  podAnnotations: {}

pdb:
  # -- Create a PodDisruptionBudget for broker pods
  enabled: true
  # -- Minimum available broker pods during voluntary disruptions
  minAvailable: 1

startupProbe:
  # -- Enable startup probe
  enabled: true
  # -- Initial delay before probe starts
  initialDelaySeconds: 5
  # -- Probe check interval
  periodSeconds: 10
  # -- Probe timeout
  timeoutSeconds: 5
  # -- Failures before marking unhealthy
  failureThreshold: 30

livenessProbe:
  # -- Enable liveness probe
  enabled: true
  # -- Initial delay before probe starts
  initialDelaySeconds: 0
  # -- Probe check interval
  periodSeconds: 20
  # -- Probe timeout
  timeoutSeconds: 5
  # -- Failures before marking unhealthy
  failureThreshold: 3

readinessProbe:
  # -- Enable readiness probe
  enabled: true
  # -- Initial delay before probe starts
  initialDelaySeconds: 0
  # -- Probe check interval
  periodSeconds: 10
  # -- Probe timeout
  timeoutSeconds: 5
  # -- Failures before marking unhealthy
  failureThreshold: 3

resources: {}
podSecurityContext: {}
securityContext:
  runAsUser: 1000
  runAsGroup: 1000

serviceAccount:
  # -- Create a dedicated ServiceAccount
  create: false
  # -- ServiceAccount name override
  name: ""
  # -- Annotations for the ServiceAccount
  annotations: {}

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
priorityClassName: ""
terminationGracePeriodSeconds: 30

podLabels: {}
podAnnotations: {}

extraVolumeMounts: []
extraVolumes: []

# -- Extra manifests to deploy alongside the chart
extraManifests: []

monitoring:
  podMonitor:
    enabled: true
  sidecar:
    enabled: true
    port: 9234
    # nodePort: 32234
    image:
      repository: sapcc/mosquitto-exporter
      tag: 0.8.0
      pullPolicy: IfNotPresent
    args:
      - --endpoint=tcp://127.0.0.1:1883
      - --user=exporter
      - --pass=exporter-pass-2024
      - --bind-address=0.0.0.0:9234
    resources:
      limits:
        cpu: 300m
        memory: 128Mi
      requests:
        cpu: 100m
        memory: 64Mi