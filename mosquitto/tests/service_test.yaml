# SPDX-License-Identifier: Apache-2.0
suite: Service
templates:
  - templates/service.yaml
tests:
  - it: should render the client Service by default
    documentIndex: 0
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.sessionAffinity
          value: None
      - contains:
          path: spec.ports
          content:
            name: mqtt
            port: 1883
            targetPort: mqtt
            protocol: TCP

  - it: should render the headless Service by default
    documentIndex: 1
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.clusterIP
          value: None
      - equal:
          path: spec.publishNotReadyAddresses
          value: true

  - it: should expose mqtts service port when TLS is enabled
    documentIndex: 0
    set:
      broker.tls.enabled: true
      broker.tls.certSecretName: mosquitto-tls
      broker.tls.port: 8883
      service.mqttsPort: 8883
    asserts:
      - notContains:
          path: spec.ports
          content:
            name: mqtt
            port: 1883
            targetPort: mqtt
            protocol: TCP
      - contains:
          path: spec.ports
          content:
            name: mqtts
            port: 8883
            targetPort: mqtts
            protocol: TCP

  - it: should expose mqtts on headless service when TLS is enabled
    documentIndex: 1
    set:
      broker.tls.enabled: true
      broker.tls.certSecretName: mosquitto-tls
      broker.tls.port: 8883
      service.mqttsPort: 8883
    asserts:
      - notContains:
          path: spec.ports
          content:
            name: mqtt
            port: 1883
            targetPort: mqtt
            protocol: TCP
      - contains:
          path: spec.ports
          content:
            name: mqtts
            port: 8883
            targetPort: mqtts
            protocol: TCP

  - it: should set externalIPs on the client Service when configured
    documentIndex: 0
    set:
      service.externalIPs[0]: "203.0.113.10"
    asserts:
      - equal:
          path: spec.externalIPs[0]
          value: "203.0.113.10"

  - it: should set static NodePorts on the client Service when configured
    documentIndex: 0
    set:
      service.mqttNodePort: 31883
      service.websocketNodePort: 31901
    asserts:
      - contains:
          path: spec.ports
          content:
            name: mqtt
            port: 1883
            targetPort: mqtt
            protocol: TCP
            nodePort: 31883
      - contains:
          path: spec.ports
          content:
            name: websocket
            port: 9001
            targetPort: websocket
            protocol: TCP
            nodePort: 31901

  - it: should set mqtts NodePort when TLS and mqttsNodePort are set
    documentIndex: 0
    set:
      broker.tls.enabled: true
      broker.tls.certSecretName: mosquitto-tls
      service.mqttsNodePort: 30883
    asserts:
      - contains:
          path: spec.ports
          content:
            name: mqtts
            port: 8883
            targetPort: mqtts
            protocol: TCP
            nodePort: 30883
