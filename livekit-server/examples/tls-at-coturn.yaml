# Default values for livekit-server.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: livekit/livekit-server
  pullPolicy: IfNotPresent
  tag: v1.13.0

imagePullSecrets: []

terminationGracePeriodSeconds: 18000

# configuration for livekit
# you may specify any config settings that are valid in livekit-server's
# config.yaml: https://github.com/livekit/livekit/blob/master/config-sample.yaml
livekit:
  port: 7880
  log_level: info
  rtc:
    tcp_port: 7881
    port_range_start: 50000
    port_range_end: 60000
    use_external_ip: true
    turn_servers:
      # Advertised TURN endpoints clients connect to. Backed by the coturn sidecar
      # (see the top-level coturn: block). secret MUST equal coturn.secret.
      - host: stream.example.com
        port: 33478
        protocol: udp
        secret: "<your secret>"
        ttl: 14400
      - host: stream.example.com
        port: 35349
        protocol: tls
        secret: "<your secret>"
        ttl: 14400
  redis:
    {}
    # supports sentinels and cluster, see above
    # address:
    # db: 0
    # username:
    # password:
  # key value pairs (<api_key>: >api_secret>)
  keys:
    web-client-key: <your secret>
    backend-service-key: <your secret>
  # Api keys can be loaded from a file
  # https://github.com/livekit/livekit/blob/6eaa300949cdfe8fbf6e2ded926c9f8c1a01bc61/pkg/config/config.go#L61
  # In order to set the api keys when using the key_file parameter configure the storeKeysInSecret block below
  # key_file: keys.yaml
  turn:
    enabled: false
    # Must match domain of your tls cert
    # domain: turn.myhost.com
    # secretName: <tlssecret>
    loadBalancerAnnotations: {}
  # webhook: <webhook configuration>
  # room: <default settings for new rooms>
  # region: <set for multi-region deploys>

# Set this option to true if you want to store your API keys in a secret instead of the config file
storeKeysInSecret:
  enabled: false
  # Use a pre existing secret, useful to combine with external secret managers
  # as GCP External Secrets or Hashicorp Vault
  existingSecret: ""
  # Define your API keys and secrets as key-value pairs here. These will be stored in the secret.
  # Example: keys:
  #           my_api_key: my_api_secret
  keys:
    {}
    # key value pairs (<api_key>: >api_secret>)

nameOverride: ""
fullnameOverride: ""

loadBalancer:
  type: disable
  servicePort: 80
  annotations: {}

service:
  port: 80

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "36000"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "36000"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
  tls:
    - hosts:
        - stream.example.com
      secretName: tlssecret
  hosts:
    - host: stream.example.com
      paths:
        - path: /
          pathType: Prefix

turnLoadbalancer:
  enable: false                         # NLB handles TURN, no separate k8s LB needed

# coturn: standalone TURN server. Use when LiveKit's built-in TURN cannot be
# advertised on a reachable address (e.g. the node sits behind an inbound-only
# NLB / egress-only NAT). Runs as a sidecar in the livekit-server pod. Disabled by
# default. When enabled, set livekit.turn.enabled=false and point
# livekit.rtc.turn_servers at coturn using the same shared secret.
coturn:
  enabled: true
  image: coturn/coturn:4.14
  imagePullPolicy: IfNotPresent
  # static-auth-secret — MUST equal one of livekit.rtc.turn_servers[].secret
  secret: "<your secret>"
  # TURN long-term-auth realm (value is arbitrary; clients read it from the challenge)
  realm: livekit
  # coturn ports. With hostNetwork these bind the node directly; align with the NLB
  # backend mapping (NLB 33478 -> listeningPort, 35439 -> tlsPort).
  # listeningPort serves BOTH UDP and plain TCP TURN (coturn's `listening-port`).
  listeningPort: 3478
  tlsPort: 5349
  relayPortStart: 30000
  relayPortEnd: 40000
  tls:
    # true  = coturn terminates TLS on tlsPort (needs cert; NLB stays TCP passthrough)
    # false = TLS terminated at the NLB (coturn serves plain TCP on listeningPort)
    enabled: true
  # TLS cert secret (kubernetes.io/tls). Empty -> defaults to livekit.turn.secretName.
  tlsSecretName: tlssecret
  resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 60
  # targetMemoryUtilizationPercentage: 80

# if LiveKit should run only on specific nodes
# this can be used to isolate designated nodes
nodeSelector:
  {}
  # node.kubernetes.io/instance-type: c5.2xlarge

resources:
  {}
  # Due to port restrictions, you can run only one instance of LiveKit per physical
  # node. Because of that, we recommend giving it plenty of resources to work with
  # limits:
  #   cpu: 6000m
  #   memory: 2048Mi
  # requests:
  #   cpu: 4000m
  #   memory: 1024Mi

serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podHostNetwork: true

podAnnotations:
  sidecar.istio.io/inject: "false"
  linkerd.io/inject: disabled

podSecurityContext:
  {}
  # fsGroup: 2000

securityContext:
  {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

tolerations: []

affinity: {}

# https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.27/#deploymentstrategy-v1-apps
deploymentStrategy: {}

deploymentAnnotations: {}

# Specifies configuration gke backendconfig
gcp:
  backendConfig:
    # 10h timeout for websocket
    timeoutSec: 36000
    connectionDraining:
      drainingTimeoutSec: 60

serviceMonitor:
  # Specifies whether a service monitor should be created
  create: false
  # Annotations to add to the service monitor
  annotations: {}
  # The name of the service monitor to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""
  # The scrape interval
  interval: 30s
